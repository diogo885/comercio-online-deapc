<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Carrinho</title>
</head>
<body>

<header>
    <h1>Carrinho de Compras</h1>
</header>

<main>

    <section>

        <h2>Produtos no Carrinho</h2>

        <p>T-Shirt - Quantidade: 1 - 20€</p>
        <p>Casaco - Quantidade: 1 - 50€</p>

        <h3>Total: 70€</h3>

        <button>Finalizar Compra</button>

    </section>

    <section>

        <h2>Dados de Pagamento</h2>

        <form>

            <label>Nome:</label>
            <input type="text">

            <br><br>

            <label>Morada:</label>
            <input type="text">

            <br><br>

            <label>Cartão:</label>
            <input type="text">

        </form>

    </section>

</main>

</body>
</html>
