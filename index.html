<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Loja de Roupa - Início</title>
</head>
<body>

<header>
    <h1>Loja de Roupa</h1>
</header>

<main>

    <section>
        <h2>Banner Promocional</h2>
        <p>Promoções e novidades da loja.</p>
    </section>

    <section>
        <h2>Registo/Login</h2>

        <form>

            <label>Nome:</label>
            <input type="text">

            <br><br>

            <label>Idade:</label>
            <input type="number">

            <br><br>

            <label>Email:</label>
            <input type="email">

            <br><br>

            <label>Número:</label>
            <input type="tel">

            <br><br>

            <button type="submit">Entrar</button>

        </form>
    </section>

</main>

<footer>
    <p>Loja Online de Roupa</p>
</footer>

</body>
</html>
